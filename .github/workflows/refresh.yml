name: Auto Refresh Dashboards

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * *'
    # 7:00 PM IST = 1:30 PM UTC
    - cron: '30 13 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run dashboard refresh
        env:
          GITHUB_TOKEN_PAT: ${{ secrets.GH_PAT_TOKEN }}
        run: python scripts/ci_refresh.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html devex-metrics.html pr-metrics.html data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')
            git commit -m "Auto refresh: ${TIMESTAMP}"
            git pull --rebase
            git push
          fi
